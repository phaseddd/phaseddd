<svg xmlns="http://www.w3.org/2000/svg" width="980" height="180" viewBox="0 0 980 180" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Manifesto</title>
  <desc id="desc">A bilingual manifesto about managing AI agents as a team.</desc>
  <style>
    .line {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
      text-anchor: middle;
      opacity: 0;
      animation: fade-in 0.65s ease-out forwards;
    }

    .cn {
      fill: #ff5ca8;
    }

    .en {
      fill: #58a6ff;
    }

    .delay-1 {
      animation-delay: 0.05s;
    }

    .delay-2 {
      animation-delay: 0.18s;
    }

    .delay-3 {
      animation-delay: 0.31s;
    }

    .delay-4 {
      animation-delay: 0.44s;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <text class="line cn delay-1" x="490" y="42">我不把 AI 当魔法按钮，我把 Agent 当团队来管理。</text>
  <text class="line cn delay-2" x="490" y="76">我不是让 AI 自动替我做事，而是在设计一套 AI 团队的组织方式、上下文、分工、制衡和验收。</text>
  <text class="line en delay-3" x="490" y="122">I do not hand work to AI. I design how agents work together.</text>
  <text class="line en delay-4" x="490" y="156">Specs, context, roles, checks, and review turn them into a team that ships.</text>
</svg>
